services:
  # Full-stack service (API + Frontend)
  - type: web
    name: abbas-threads-api
    env: node
    plan: free
    region: singapore
    buildCommand: npm install && npm run build && cd server && npm install
    startCommand: cd server && node index.js
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DB_PORT
        value: 3306
      - key: DB_SSL
        value: true
      - key: JWT_SECRET
        generateValue: true
      # The following must be set in the Render Dashboard after creation:
      # DB_HOST, DB_USER, DB_PASSWORD, DB_NAME
      # GOOGLE_CLIENT_ID
      # RAZORPAY_KEY_ID, RAZORPAY_KEY_SECRET

